<div id="footer_wrap" class="outer">
  <footer class="inner">
    {% if site.github.is_project_page %}
    <p class="copyright">
      {{ site.title | default: site.github.repository_name }} maintained by
      <a href="{{ site.github.owner_url }}">Ludovic Engrand</a>
    </p>
    {% endif %}
    <p>
      <a href="/terms_of_service.html">{{ site.data[site.active_lang].l10n.terms_of_service }}</a> |
      <a href="/privacy_policy.html">{{ site.data[site.active_lang].l10n.privacy_policy }}</a>
    </p>
  </footer>
</div>
